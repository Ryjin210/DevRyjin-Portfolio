	<style>
    /* Container */
.mcard {
  overflow: visible;
  width: 300px;
  height: 200px;
}

.tab-head {
	font-family: sen;
    font-size: 20px;
}

.mcard-inner {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 300ms;
  box-shadow: 0px 0px 10px 1px #000000ee;
  border-radius: 5px;
}

.mcard:hover .mcard-inner {
  transform: rotateY(180deg);
}

/* Shared Face Styles */
.mcard-front, 
.mcard-back {
  background-color: #151515;
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 5px;
  overflow: hidden;
}

/* Initial Hover Me View */
.mcard-front {
  display: flex;
  justify-content: center;
  align-items: center;
}

.mcard-front::before {
  position: absolute;
  content: ' ';
  display: block;
  width: 160px;
  height: 160%;
  background: linear-gradient(90deg, transparent, #ff9966, #ff9966, #ff9966, #ff9966, transparent);
  animation: rotation_481 5000ms infinite linear;
}

.mcard-front-content {
  position: absolute;
  width: 99%;
  height: 99%;
  background-color: #151515;
  border-radius: 5px;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

/* Recipe Content View */
.mcard-back {
  transform: rotateY(180deg);
  color: white;
}

.mcard-back-content {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-sizing: border-box;
}

.mcard-badge {
  background-color: #00000055;
  padding: 2px 10px;
  border-radius: 10px;
  backdrop-filter: blur(2px);
  width: fit-content;
}

.mcard-description {
  box-shadow: 0px 0px 10px 5px #00000088;
  width: 100%;
  padding: 10px;
  background-color: #00000099;
  backdrop-filter: blur(5px);
  border-radius: 5px;
  box-sizing: border-box;
  height:300px;
}

.mcard-header {
  font-size: 11px;
  max-width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.mcard-title {
  width: 100%;
  margin: 0; 
  font-family:"poppins";
  font-weight:300;
  font-size: 14px;
}

.mcard-footer {
  color: #ffffff88;
  margin-top: 5px;
  margin-bottom: 0;
  font-size: 8px;
}

/* Background Effects */
.mcard-bg-effect {
  position: absolute;
  width: 100%;
  height: 100%;
}

.mcard-circle {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background-color: #83004F;
  position: absolute; 
  filter: blur(15px);
  animation: floating 2600ms infinite linear;
}

<script>
    document.addEventListener('DOMContentLoaded', () => {
    initPortfolioCarousel('#mobilePortfolioCarousel', true);
});

function initPortfolioCarousel(carouselSelector, enableSwipe) {
    const carousel = document.querySelector(carouselSelector);
    if (!carousel) return;

    const track = carousel.querySelector('.carousel-track');
    const slides = Array.from(track.children);
    const nextButton = carousel.querySelector('.carousel-btn--right');
    const prevButton = carousel.querySelector('.carousel-btn--left');
    const dotsNav = carousel.querySelector('.carousel-nav');
    const dots = Array.from(dotsNav.children);

    // Arrange slides side-by-side using rock-solid percentages instead of pixels
    const setSlidePosition = (slide, index) => {
        slide.style.left = (index * 100) + '%';
    };
    slides.forEach(setSlidePosition);

    const moveToSlide = (currentSlide, targetSlide) => {
        const targetIndex = slides.findIndex(slide => slide === targetSlide);
        track.style.transform = 'translateX(-' + (targetIndex * 100) + '%)';
        currentSlide.classList.remove('current-slide');
        targetSlide.classList.add('current-slide');
    };

    const updateDots = (currentDot, targetDot) => {
        currentDot.classList.remove('current-slide');
        targetDot.classList.add('current-slide');
    };

    const hideShowArrows = (targetIndex) => {
        if (targetIndex === 0) {
            prevButton.classList.add('is-hidden');
            nextButton.classList.remove('is-hidden');
        } else if (targetIndex === slides.length - 1) {
            prevButton.classList.remove('is-hidden');
            nextButton.classList.add('is-hidden');
        } else {
            prevButton.classList.remove('is-hidden');
            nextButton.classList.remove('is-hidden');
        }
    };

    const goNext = () => {
        const currentSlide = track.querySelector('.current-slide');
        const nextSlide = currentSlide.nextElementSibling;
        if (!nextSlide) return;
        const currentDot = dotsNav.querySelector('.current-slide');
        const nextDot = currentDot.nextElementSibling;
        const nextIndex = slides.findIndex(slide => slide === nextSlide);

        moveToSlide(currentSlide, nextSlide);
        updateDots(currentDot, nextDot);
        hideShowArrows(nextIndex);
    };

    const goPrev = () => {
        const currentSlide = track.querySelector('.current-slide');
        const prevSlide = currentSlide.previousElementSibling;
        if (!prevSlide) return;
        const currentDot = dotsNav.querySelector('.current-slide');
        const prevDot = currentDot.previousElementSibling;
        const prevIndex = slides.findIndex(slide => slide === prevSlide);

        moveToSlide(currentSlide, prevSlide);
        updateDots(currentDot, prevDot);
        hideShowArrows(prevIndex);
    };

    nextButton.addEventListener('click', goNext);
    prevButton.addEventListener('click', goPrev);

    dotsNav.addEventListener('click', e => {
        const targetDot = e.target.closest('button');
        if (!targetDot) return;
        const currentSlide = track.querySelector('.current-slide');
        const currentDot = dotsNav.querySelector('.current-slide');
        const targetIndex = dots.findIndex(dot => dot === targetDot);
        const targetSlide = slides[targetIndex];
        moveToSlide(currentSlide, targetSlide);
        updateDots(currentDot, targetDot);
        hideShowArrows(targetIndex);
    });

    if (enableSwipe) {
        let touchStartX = 0;
        let touchEndX = 0;
        const swipeThreshold = 50;

        carousel.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        carousel.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchStartX - touchEndX;
            if (swipeDistance > swipeThreshold) {
                goNext();
            } else if (swipeDistance < -swipeThreshold) {
                goPrev();
            }
        }
    }
    
    const learnMoreBtnsMobile = carousel.querySelectorAll('.learn-more-btn-mobile');
    learnMoreBtnsMobile.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const modalId = e.target.getAttribute('data-target');
            console.log(`Open mobile-specific modal: ${modalId}`);
        });
    });
}

.orbit-animation {
    position: absolute;
    top: -3%;
    left: -5%;
    width: 115%;
    height: 115%;
    z-index: 1;

    /* 1. THE TRICK: Stack them in one line */
    /* Pattern: [Gradient 1] -> [Gradient 2] -> [Gradient 1] */
    background: linear-gradient(
        150deg,
        rgba(12, 123, 179, 1),   /* Start Blue */
        rgba(242, 186, 232, 1),  /* Start Pink */
        
        rgba(7, 163, 178, 1),    /* Target Teal */
        rgba(217, 236, 199, 1),  /* Target Green */
        
        rgba(12, 123, 179, 1),   /* Loop back to Blue */
        rgba(242, 186, 232, 1)   /* Loop back to Pink */
    );

    /* 2. ZOOM IN so you only see one set at a time */
    background-size: 300% 300%;

    /* Shape settings */
    border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    
    /* 3. COMBINED ANIMATIONS (Must be on one line!) */
    animation: 
        rotate-orbit2 20s linear infinite, 
        gradient-shift 6s ease-in-out infinite alternate;
	will-change: transform, background-position;
}

/* --- ANIMATIONS --- */

/* New Gradient Animation: Moves the position instead of changing the color */
@keyframes gradient-shift {
    0% {
        background-position: 0% 50%; /* Shows the Blue/Pink */
    }
    100% {
        background-position: 100% 50%; /* Shows the Teal/Green */
    }
}

@keyframes rotate-orbit2 {
    0% { transform: rotate(360deg); }
    100% { transform: rotate(0deg); }
}

@keyframes blob-bounce {
    0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
    100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
}

/* --- THE FRAMER "PREMIUM" FADE --- */

/* 1. Define the Animation Keyframes */
@keyframes framerFadeUp {
    0% {
        opacity: 0;      /* The secret sauce: Starts blurry */
        transform: translateY(40px) scale(0.95); /* Starts lower and slightly smaller */
    }
    100% {
        opacity: 1;      /* Becomes sharp */
        transform: translateY(0) scale(1);       /* Settles in place */
    }
}

@keyframes framerFadeDown {
    0% {
        opacity: 0;
        transform: translateY(-40px) scale(0.95);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
